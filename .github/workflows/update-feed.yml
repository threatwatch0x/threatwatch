name: Update threat feed

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        env:
          ABUSECH_AUTH_KEY: ${{ secrets.ABUSECH_AUTH_KEY }}
        run: python3 scripts/fetch_feeds.py

      - name: Copy feed to docs
        run: cp data/feed.json docs/feed.json

      - name: Commit updated data
        run: |
          git config user.name "threatwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/feed.json data/history.json docs/feed.json 2>/dev/null || true
          git diff --quiet --cached || git commit -m "chore: update threat feed data [skip ci]"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

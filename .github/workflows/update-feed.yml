name: Update threat feed

on:
  schedule:
    # Elke 30 minuten. abuse.ch vraagt redelijk gebruik (niet vaker dan
    # elke 5-10 min); 30 min is ruim binnen die marge en past bij het
    # 20-min refresh-cycle van vergelijkbare commerciële platforms.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # handmatig kunnen triggeren via de Actions tab
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        env:
          ABUSECH_AUTH_KEY: ${{ secrets.ABUSECH_AUTH_KEY }}
        run: python3 scripts/fetch_feeds.py


       

      - name: Commit updated data
        run: |
          git config user.name "threatwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/feed.json data/history.json data/posted_ids.json 2>/dev/null || true
          git diff --quiet --cached || git commit -m "chore: update threat feed data [skip ci]"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
